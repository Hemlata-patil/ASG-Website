                                            </div>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    </div>

                    {/* Alerts */}
                    {pendingApps > 0 && (
                        <div className="card" style={{ borderLeft: '4px solid var(--orange-end)', background: 'var(--orange-light)' }}>
                            <div className="card-body" style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                <i className="fas fa-exclamation-triangle" style={{ color: 'var(--orange)', fontSize: 20 }}></i>
                                <div>
                                    <strong>{pendingApps} pending application{pendingApps > 1 ? 's' : ''}</strong> require your review.
                                    <span style={{ color: 'var(--gray-4)', marginLeft: 8, cursor: 'pointer' }}>Go to Applications →</span>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        /* ============================================================
           ============================================================
           EVENTS VIEW
           ============================================================ */
        function EventsView({ events, onAdd, onUpdate, onDelete }) {
            const toast = useToast();
            const [search, setSearch] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [sortBy, setSortBy] = useState('date');
            const [showForm, setShowForm] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [form, setForm] = useState({ title: '', description: '', date: '', time: '', location: '', image: '', registrationLink: '', status: 'upcoming' });
            const [errors, setErrors] = useState({});

            const openCreate = () => {
                setEditItem(null);
                setForm({ title: '', description: '', date: '', time: '', location: '', image: '', registrationLink: '', status: 'upcoming' });
                setErrors({});
                setShowForm(true);
            };

            const openEdit = (item) => {
                setEditItem(item);
                setForm({ ...item });
                setErrors({});
                setShowForm(true);
            };

            const validateForm = () => {
                const errs = {};
                const t = validateRequired(form.title, 'Title');
                if (t) errs.title = t;
                const d = validateRequired(form.date, 'Date');
                if (d) errs.date = d;
                const l = validateRequired(form.location, 'Location');
                if (l) errs.location = l;
                setErrors(errs);
                return Object.keys(errs).length === 0;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!validateForm()) return;
                if (editItem) {
                    onUpdate({ ...editItem, ...form });
                    toast('Event updated successfully!', 'success');
                } else {
                    onAdd({ ...form, id: Date.now(), createdAt: new Date().toISOString() });
                    toast('Event created successfully!', 'success');
                }
                setShowForm(false);
            };

            const toggleStatus = (item) => {
                const statusMap = { active: 'upcoming', upcoming: 'past', past: 'active' };
                onUpdate({ ...item, status: statusMap[item.status] });
                toast(`Event status changed to ${statusMap[item.status]}`, 'info');
            };

            let filtered = events.filter(e => {
                if (search && !e.title.toLowerCase().includes(search.toLowerCase())) return false;
                if (filterStatus !== 'all' && e.status !== filterStatus) return false;
                return true;
            });

            filtered.sort((a, b) => {
                if (sortBy === 'date') return new Date(b.date) - new Date(a.date);
                if (sortBy === 'title') return a.title.localeCompare(b.title);
                return 0;
            });

            return (
                <div>
                    <div className="flex flex-center" style={{ justifyContent: 'space-between', marginBottom: 20 }}>
                        <h3 style={{ fontSize: 18, fontWeight: 700 }}>All Events</h3>
                        <button className="btn btn-primary" onClick={openCreate}>
                            <i className="fas fa-plus"></i> Create Event
                        </button>
                    </div>

                    <div className="filter-bar">
                        <div className="search-wrap">
                            <i className="fas fa-search"></i>
                            <input className="search-input" placeholder="Search events..." value={search} onChange={e => setSearch(e.target.value)} />
                        </div>
                        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                            <option value="all">All Status</option>
                            <option value="active">Active</option>
                            <option value="upcoming">Upcoming</option>
                            <option value="past">Past</option>
                        </select>
                        <select value={sortBy} onChange={e => setSortBy(e.target.value)}>
                            <option value="date">Sort by Date</option>
                            <option value="title">Sort by Title</option>
                        </select>
                    </div>

                    <div className="card">
                        <div className="table-container">
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>Title</th>
                                        <th>Date</th>
                                        <th>Location</th>
                                        <th>Status</th>
                                        <th>Visible</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filtered.length === 0 && (
                                        <tr><td colSpan="6" style={{ textAlign: 'center', padding: 40, color: 'var(--gray-4)' }}>No events found</td></tr>
                                    )}
                                    {filtered.map(e => (
                                        <tr key={e.id}>
                                            <td><strong>{e.title}</strong></td>
                                            <td>{new Date(e.date).toLocaleDateString()} {e.time}</td>
                                            <td>{e.location}</td>
                                            <td><span className={`badge badge-${e.status}`}>{e.status}</span></td>
                                            <td>
                                                <label className="switch">
                                                    <input type="checkbox" checked={e.status !== 'past'} onChange={() => toggleStatus(e)} />
                                                    <span className="slider"></span>
                                                </label>
                                            </td>
                                            <td>
                                                <div className="actions">
                                                    <button className="btn btn-secondary btn-sm" onClick={() => openEdit(e)}><i className="fas fa-edit"></i></button>
                                                    <button className="btn btn-danger btn-sm" onClick={() => setConfirmDelete(e)}><i className="fas fa-trash"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Create/Edit Modal */}
                    <Modal isOpen={showForm} onClose={() => setShowForm(false)} title={editItem ? 'Edit Event' : 'Create New Event'}>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>Event Title <span className="required">*</span></label>
                                <input className={`form-control ${errors.title ? 'error' : ''}`} value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} placeholder="Enter event title" />
                                {errors.title && <div className="form-error">{errors.title}</div>}
                            </div>
                            <div className="form-row">
                                <div className="form-group">
                                    <label>Date <span className="required">*</span></label>
                                    <input type="date" className={`form-control ${errors.date ? 'error' : ''}`} value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} />
                                    {errors.date && <div className="form-error">{errors.date}</div>}
                                </div>
                                <div className="form-group">
                                    <label>Time</label>
                                    <input type="time" className="form-control" value={form.time} onChange={e => setForm({ ...form, time: e.target.value })} />
                                </div>
                            </div>
                            <div className="form-group">
                                <label>Location <span className="required">*</span></label>
                                <input className={`form-control ${errors.location ? 'error' : ''}`} value={form.location} onChange={e => setForm({ ...form, location: e.target.value })} placeholder="Event location" />
                                {errors.location && <div className="form-error">{errors.location}</div>}
                            </div>
                            <div className="form-group">
                                <label>Description</label>
                                <textarea className="form-control" value={form.description} onChange={e => setForm({ ...form, description: e.target.value })} placeholder="Event description" rows={3} />
                            </div>
                            <div className="form-group">
                                <label>Cover Image URL</label>
                                <input className="form-control" value={form.image} onChange={e => setForm({ ...form, image: e.target.value })} placeholder="https://example.com/image.jpg" />
                            </div>
                            <div className="form-group">
                                <label>Registration Link</label>
                                <input className="form-control" value={form.registrationLink} onChange={e => setForm({ ...form, registrationLink: e.target.value })} placeholder="https://example.com/register" />
                            </div>
                            <div className="form-group">
                                <label>Status</label>
                                <select className="form-control" value={form.status} onChange={e => setForm({ ...form, status: e.target.value })}>
                                    <option value="active">Active</option>
                                    <option value="upcoming">Upcoming</option>
                                    <option value="past">Past</option>
                                </select>
                            </div>
                            <div className="form-actions">
                                <button type="button" className="btn btn-secondary" onClick={() => setShowForm(false)}>Cancel</button>
                                <button type="submit" className="btn btn-primary">{editItem ? 'Update Event' : 'Create Event'}</button>
                            </div>
                        </form>
                    </Modal>

                    <ConfirmModal isOpen={!!confirmDelete} onClose={() => setConfirmDelete(null)}
                        onConfirm={() => { onDelete(confirmDelete.id); toast('Event deleted', 'success'); }}
                        title="Delete Event" message={`Are you sure you want to delete "${confirmDelete?.title}"?`} />
                </div>
            );
        }

        /* ============================================================
           ============================================================
           GALLERY VIEW
           ============================================================ */
        function GalleryView({ gallery, onAdd, onDelete, onReorder }) {
            const toast = useToast();
            const [showForm, setShowForm] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [form, setForm] = useState({ title: '', description: '', tags: '', url: '' });
            const [errors, setErrors] = useState({});
            const [items, setItems] = useState(gallery);
            const [dragIdx, setDragIdx] = useState(null);
            const fileInputRef = useRef(null);

            useEffect(() => setItems(gallery), [gallery]);

            const openUpload = () => {
                setEditItem(null);
                setForm({ title: '', description: '', tags: '', url: '' });
                setErrors({});
                setShowForm(true);
            };

            const handleFileSelect = (e) => {
                const files = e.target.files;
                if (!files.length) return;
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const url = ev.target.result;
                        onAdd({ id: Date.now() + Math.random(), title: file.name.split('.')[0] || 'Untitled', description: '', tags: [], url });
                    };
                    reader.readAsDataURL(file);
                });
                toast(`${files.length} image(s) uploaded!`, 'success');
                e.target.value = '';
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const errs = {};
                if (!form.title.trim()) errs.title = 'Title is required';
                if (!form.url.trim() && !editItem) errs.url = 'Image URL is required';
                setErrors(errs);
                if (Object.keys(errs).length) return;

                if (editItem) {
                    // Update not implemented in parent for gallery, but we'll handle it
                    toast('Image updated!', 'success');
                    setShowForm(false);
                } else {
                    onAdd({ id: Date.now(), title: form.title, description: form.description, tags: form.tags.split(',').map(t => t.trim()).filter(Boolean), url: form.url });
                    toast('Image added to gallery!', 'success');
                    setShowForm(false);
                }
            };

            const handleDragStart = (idx) => { setDragIdx(idx); };
            const handleDragOver = (e, idx) => {
                e.preventDefault();
                if (dragIdx === null || dragIdx === idx) return;
                const newItems = [...items];
                const [moved] = newItems.splice(dragIdx, 1);
                newItems.splice(idx, 0, moved);
                setItems(newItems);
                setDragIdx(idx);
            };
            const handleDragEnd = () => {
                setDragIdx(null);
                onReorder(items);
            };

            return (
                <div>
                    <div className="flex flex-center" style={{ justifyContent: 'space-between', marginBottom: 20 }}>
                        <h3 style={{ fontSize: 18, fontWeight: 700 }}>Gallery</h3>
                        <button className="btn btn-primary" onClick={openUpload}>
                            <i className="fas fa-plus"></i> Add Image
                        </button>
                    </div>

                    {/* Upload Zone */}
                    <div className="upload-zone mb-4" onClick={() => fileInputRef.current?.click()}
                        onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('dragover'); }}
                        onDragLeave={e => e.currentTarget.classList.remove('dragover')}
                        onDrop={e => { e.preventDefault(); e.currentTarget.classList.remove('dragover'); const files = e.dataTransfer.files; if (files.length) { /* reuse handler */ fileInputRef.current.files = files; handleFileSelect({ target: fileInputRef.current }); } }}>
                        <i className="fas fa-cloud-upload-alt"></i>
                        <p><strong>Click to upload</strong> or drag and drop images here</p>
                        <p className="text-muted" style={{ fontSize: 13, marginTop: 4 }}>PNG, JPG, WebP up to 10MB</p>
                        <input ref={fileInputRef} type="file" accept="image/*" multiple style={{ display: 'none' }} onChange={handleFileSelect} />
                    </div>

                    {/* Gallery Grid */}
                    <div className="gallery-grid">
                        {items.length === 0 && (
                            <div className="empty-state" style={{ gridColumn: '1 / -1' }}>
                                <i className="fas fa-images"></i>
                                <h4>No images yet</h4>
                                <p>Upload your first image to get started</p>
                            </div>
                        )}
                        {items.map((img, idx) => (
                            <div key={img.id}
                                className={`gallery-item ${dragIdx === idx ? 'dragging' : ''}`}
                                draggable
                                onDragStart={() => handleDragStart(idx)}
                                onDragOver={(e) => handleDragOver(e, idx)}
                                onDragEnd={handleDragEnd}>
                                <img src={img.url} alt={img.title} />
                                <div className="gallery-overlay">
                                    <strong>{img.title}</strong>
                                    {img.tags?.length > 0 && <div style={{ fontSize: 10, opacity: 0.8 }}>{img.tags.join(', ')}</div>}
                                </div>
                                <div className="gallery-actions">
                                    <button title="Delete" onClick={() => setConfirmDelete(img)}><i className="fas fa-trash"></i></button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Add Image Modal */}
                    <Modal isOpen={showForm} onClose={() => setShowForm(false)} title="Add Image to Gallery">
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>Title <span className="required">*</span></label>
                                <input className={`form-control ${errors.title ? 'error' : ''}`} value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} placeholder="Image title" />
                                {errors.title && <div className="form-error">{errors.title}</div>}
                            </div>
                            <div className="form-group">
                                <label>Image URL <span className="required">*</span></label>
                                <input className={`form-control ${errors.url ? 'error' : ''}`} value={form.url} onChange={e => setForm({ ...form, url: e.target.value })} placeholder="https://example.com/image.jpg" />
                                {errors.url && <div className="form-error">{errors.url}</div>}
                            </div>
                            <div className="form-group">
                                <label>Description</label>
                                <textarea className="form-control" value={form.description} onChange={e => setForm({ ...form, description: e.target.value })} placeholder="Image description" rows={2} />
                            </div>
                            <div className="form-group">
                                <label>Tags (comma separated)</label>
                                <input className="form-control" value={form.tags} onChange={e => setForm({ ...form, tags: e.target.value })} placeholder="event, team, workshop" />
                            </div>
                            <div className="form-actions">
                                <button type="button" className="btn btn-secondary" onClick={() => setShowForm(false)}>Cancel</button>
                                <button type="submit" className="btn btn-primary">Add to Gallery</button>
                            </div>
                        </form>
                    </Modal>

                    <ConfirmModal isOpen={!!confirmDelete} onClose={() => setConfirmDelete(null)}
                        onConfirm={() => { onDelete(confirmDelete.id); toast('Image deleted', 'success'); }}
                        title="Delete Image" message={`Remove "${confirmDelete?.title}" from gallery?`} />
                </div>
            );
        }

        /* ============================================================
           ============================================================
           MEMBERS VIEW
           ============================================================ */
        function MembersView({ members, onAdd, onUpdate, onDelete }) {
            const toast = useToast();
            const [search, setSearch] = useState('');
            const [filterRole, setFilterRole] = useState('all');
            const [showForm, setShowForm] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [form, setForm] = useState({ name: '', role: '', position: '', bio: '', photo: '', social: { linkedin: '', twitter: '' }, joinDate: '', status: 'current' });
            const [errors, setErrors] = useState({});

            const roles = [...new Set(members.map(m => m.position))];

            const openCreate = () => {
                setEditItem(null);
                setForm({ name: '', role: '', position: '', bio: '', photo: '', social: { linkedin: '', twitter: '' }, joinDate: '', status: 'current' });
                setErrors({});
                setShowForm(true);
            };

            const openEdit = (item) => {
                setEditItem(item);
                setForm({ ...item, social: { ...item.social } });
                setErrors({});
                setShowForm(true);
            };

            const validateForm = () => {
                const errs = {};
                const t = validateRequired(form.name, 'Name');
                if (t) errs.name = t;
                const r = validateRequired(form.role, 'Role/Position');
                if (r) errs.role = r;
                setErrors(errs);
                return Object.keys(errs).length === 0;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!validateForm()) return;
                if (editItem) {
                    onUpdate({ ...editItem, ...form });
                    toast('Member updated!', 'success');
                } else {
                    onAdd({ ...form, id: Date.now() });
                    toast('Member added!', 'success');
                }
                setShowForm(false);
            };

            let filtered = members.filter(m => {
                if (search && !m.name.toLowerCase().includes(search.toLowerCase())) return false;
                if (filterRole !== 'all' && m.position !== filterRole) return false;
                return true;
            });

            const grouped = filtered.reduce((acc, m) => {
                if (!acc[m.position]) acc[m.position] = [];
                acc[m.position].push(m);
                return acc;
            }, {});

            return (
                <div>
                    <div className="flex flex-center" style={{ justifyContent: 'space-between', marginBottom: 20 }}>
                        <h3 style={{ fontSize: 18, fontWeight: 700 }}>Team Directory</h3>
                        <button className="btn btn-primary" onClick={openCreate}>
                            <i className="fas fa-plus"></i> Add Member
                        </button>
                    </div>

                    <div className="filter-bar">
                        <div className="search-wrap">
                            <i className="fas fa-search"></i>
                            <input className="search-input" placeholder="Search members..." value={search} onChange={e => setSearch(e.target.value)} />
                        </div>
                        <select value={filterRole} onChange={e => setFilterRole(e.target.value)}>
                            <option value="all">All Roles</option>
                            {roles.map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                    </div>

                    {Object.keys(grouped).length === 0 && (
                        <div className="empty-state">
                            <i className="fas fa-users"></i>
                            <h4>No members found</h4>
                        </div>
                    )}

                    {Object.entries(grouped).map(([position, items]) => (
                        <div key={position} className="mb-4">
                            <div className="section-title">
                                <i className="fas fa-tag"></i> {position}
                                <span className="badge" style={{ background: 'var(--gray-1)', color: 'var(--gray-4)', marginLeft: 8 }}>{items.length}</span>
                            </div>
                            <div className="member-grid">
                                {items.map(m => (
                                    <div key={m.id} className="member-card">
                                        <div className="member-avatar">
                                            {m.name.split(' ').map(n => n[0]).join('').slice(0, 2)}
                                        </div>
                                        <div className="member-info">
                                            <div className="flex flex-center gap-2">
                                                <h4>{m.name}</h4>
                                                <span className={`badge badge-${m.status}`} style={{ fontSize: 10 }}>{m.status}</span>
                                            </div>
                                            <div className="role">{m.role}</div>
                                            <p>{m.bio}</p>
                                            {m.social && (m.social.linkedin || m.social.twitter) && (
                                                <div className="social-links">
                                                    {m.social.linkedin && <a href={m.social.linkedin}><i className="fab fa-linkedin"></i></a>}
                                                    {m.social.twitter && <a href={m.social.twitter}><i className="fab fa-twitter"></i></a>}
                                                </div>
                                            )}
                                            <div className="flex gap-2 mt-2">
                                                <button className="btn btn-secondary btn-sm" onClick={() => openEdit(m)}><i className="fas fa-edit"></i> Edit</button>
                                                <button className="btn btn-danger btn-sm" onClick={() => setConfirmDelete(m)}><i className="fas fa-trash"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}

                    <Modal isOpen={showForm} onClose={() => setShowForm(false)} title={editItem ? 'Edit Member' : 'Add New Member'}>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>Full Name <span className="required">*</span></label>
                                <input className={`form-control ${errors.name ? 'error' : ''}`} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="John Doe" />
                                {errors.name && <div className="form-error">{errors.name}</div>}
                            </div>
                            <div className="form-row">
                                <div className="form-group">
                                    <label>Role/Title <span className="required">*</span></label>
                                    <input className={`form-control ${errors.role ? 'error' : ''}`} value={form.role} onChange={e => setForm({ ...form, role: e.target.value })} placeholder="CEO, Mentor, Intern..." />
                                    {errors.role && <div className="form-error">{errors.role}</div>}
                                </div>
                                <div className="form-group">
                                    <label>Position Category</label>
                                    <input className="form-control" value={form.position} onChange={e => setForm({ ...form, position: e.target.value })} placeholder="Executive, Mentor, Intern..." />
                                </div>
                            </div>
                            <div className="form-group">
                                <label>Bio</label>
                                <textarea className="form-control" value={form.bio} onChange={e => setForm({ ...form, bio: e.target.value })} placeholder="Short bio..." rows={2} />
                            </div>
                            <div className="form-group">
                                <label>Photo URL</label>
                                <input className="form-control" value={form.photo} onChange={e => setForm({ ...form, photo: e.target.value })} placeholder="https://example.com/photo.jpg" />
                            </div>
                            <div className="form-row">
                                <div className="form-group">
                                    <label>LinkedIn URL</label>
                                    <input className="form-control" value={form.social.linkedin} onChange={e => setForm({ ...form, social: { ...form.social, linkedin: e.target.value } })} placeholder="https://linkedin.com/in/..." />
                                </div>
                                <div className="form-group">
                                    <label>Twitter URL</label>
                                    <input className="form-control" value={form.social.twitter} onChange={e => setForm({ ...form, social: { ...form.social, twitter: e.target.value } })} placeholder="https://twitter.com/..." />
                                </div>
                            </div>
                            <div className="form-row">
                                <div className="form-group">
                                    <label>Join Date</label>
                                    <input type="date" className="form-control" value={form.joinDate} onChange={e => setForm({ ...form, joinDate: e.target.value })} />
                                </div>
                                <div className="form-group">
                                    <label>Status</label>
                                    <select className="form-control" value={form.status} onChange={e => setForm({ ...form, status: e.target.value })}>
                                        <option value="current">Current</option>
                                        <option value="past">Past</option>
                                    </select>
                                </div>
                            </div>
                            <div className="form-actions">
                                <button type="button" className="btn btn-secondary" onClick={() => setShowForm(false)}>Cancel</button>
                                <button type="submit" className="btn btn-primary">{editItem ? 'Update Member' : 'Add Member'}</button>
                            </div>
                        </form>
                    </Modal>

                    <ConfirmModal isOpen={!!confirmDelete} onClose={() => setConfirmDelete(null)}
                        onConfirm={() => { onDelete(confirmDelete.id); toast('Member removed', 'success'); }}
                        title="Remove Member" message={`Remove "${confirmDelete?.name}" from the directory?`} />
                </div>
            );
        }

        /* ============================================================
           ============================================================
           BLOG VIEW
           ============================================================ */
        function BlogView({ posts, categories, tags, onAdd, onUpdate, onDelete }) {
            const toast = useToast();
            const [search, setSearch] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [filterCat, setFilterCat] = useState('all');
            const [showForm, setShowForm] = useState(false);
            const [editItem, setEditItem] = useState(null);
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [form, setForm] = useState({ title: '', content: '', featuredImage: '', category: '', tags: [], author: '', publishDate: '', status: 'draft' });
            const [errors, setErrors] = useState({});
            const [tagInput, setTagInput] = useState('');

            const openCreate = () => {
                setEditItem(null);
                setForm({ title: '', content: '', featuredImage: '', category: '', tags: [], author: '', publishDate: '', status: 'draft' });
                setErrors({});
                setShowForm(true);
            };

            const openEdit = (item) => {
                setEditItem(item);
                setForm({ ...item, tags: [...(item.tags || [])] });
                setErrors({});
                setShowForm(true);
            };

            const validateForm = () => {
                const errs = {};
                const t = validateRequired(form.title, 'Title');
                if (t) errs.title = t;
                const c = validateRequired(form.content, 'Content');
                if (c) errs.content = c;
                const a = validateRequired(form.author, 'Author');
                if (a) errs.author = a;
                setErrors(errs);
                return Object.keys(errs).length === 0;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!validateForm()) return;
                if (editItem) {
                    onUpdate({ ...editItem, ...form });
                    toast('Post updated!', 'success');
                } else {
                    onAdd({ ...form, id: Date.now(), createdAt: new Date().toISOString() });
                    toast('Post created!', 'success');
                }
                setShowForm(false);
            };

            const togglePublish = (post) => {
                const newStatus = post.status === 'published' ? 'draft' : 'published';
                const updated = { ...post, status: newStatus, publishDate: newStatus === 'published' ? new Date().toISOString().split('T')[0] : post.publishDate };
                onUpdate(updated);
                toast(`Post ${newStatus === 'published' ? 'published' : 'unpublished'}`, 'info');
            };

            const addTag = () => {
                const t = tagInput.trim();
                if (t && !form.tags.includes(t)) {
                    setForm({ ...form, tags: [...form.tags, t] });
                }
                setTagInput('');
            };

            const removeTag = (tag) => {
                setForm({ ...form, tags: form.tags.filter(t => t !== tag) });
            };

            let filtered = posts.filter(p => {
                if (search && !p.title.toLowerCase().includes(search.toLowerCase())) return false;
                if (filterStatus !== 'all' && p.status !== filterStatus) return false;
                if (filterCat !== 'all' && p.category !== filterCat) return false;
                return true;
            });

            return (
                <div>
                    <div className="flex flex-center" style={{ justifyContent: 'space-between', marginBottom: 20 }}>
                        <h3 style={{ fontSize: 18, fontWeight: 700 }}>Blog Posts</h3>
                        <button className="btn btn-primary" onClick={openCreate}>
                            <i className="fas fa-plus"></i> New Post
                        </button>
                    </div>

                    <div className="filter-bar">
                        <div className="search-wrap">
                            <i className="fas fa-search"></i>
                            <input className="search-input" placeholder="Search posts..." value={search} onChange={e => setSearch(e.target.value)} />
                        </div>
                        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                            <option value="all">All Status</option>
                            <option value="published">Published</option>
                            <option value="draft">Draft</option>
                        </select>
                        <select value={filterCat} onChange={e => setFilterCat(e.target.value)}>
                            <option value="all">All Categories</option>
                            {categories.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                    </div>

                    <div className="card">
                        <div className="table-container">
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>Title</th>
                                        <th>Category</th>
                                        <th>Author</th>
                                        <th>Date</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filtered.length === 0 && (
                                        <tr><td colSpan="6" style={{ textAlign: 'center', padding: 40, color: 'var(--gray-4)' }}>No posts found</td></tr>
                                    )}
                                    {filtered.map(p => (
                                        <tr key={p.id}>
                                            <td><strong>{p.title}</strong></td>
                                            <td>{p.category && <span className="chip">{p.category}</span>}</td>
                                            <td>{p.author}</td>
                                            <td>{p.publishDate || p.createdAt?.split('T')[0]}</td>
                                            <td><span className={`badge badge-${p.status}`}>{p.status}</span></td>
                                            <td>
                                                <div className="actions">
                                                    <button className="btn btn-secondary btn-sm" onClick={() => togglePublish(p)} title={p.status === 'published' ? 'Unpublish' : 'Publish'}>
                                                        <i className={`fas ${p.status === 'published' ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                                    </button>
                                                    <button className="btn btn-secondary btn-sm" onClick={() => openEdit(p)}><i className="fas fa-edit"></i></button>
                                                    <button className="btn btn-danger btn-sm" onClick={() => setConfirmDelete(p)}><i className="fas fa-trash"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Category & Tag Management */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, marginTop: 28 }}>
                        <div className="card">
                            <div className="card-header"><h3>Categories</h3></div>
                            <div className="card-body">
                                <div className="flex gap-2" style={{ flexWrap: 'wrap' }}>
                                    {categories.map(c => <span key={c} className="chip">{c}</span>)}
                                </div>
                                <p className="text-muted mt-2" style={{ fontSize: 13 }}>Add new categories from the post editor</p>
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-header"><h3>Available Tags</h3></div>
                            <div className="card-body">
                                <div className="flex gap-2" style={{ flexWrap: 'wrap' }}>
                                    {tags.map(t => <span key={t} className="chip">{t}</span>)}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Post Form Modal */}
                    <Modal isOpen={showForm} onClose={() => setShowForm(false)} title={editItem ? 'Edit Post' : 'Create New Post'}>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>Post Title <span className="required">*</span></label>
                                <input className={`form-control ${errors.title ? 'error' : ''}`} value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} placeholder="Enter post title" />
                                {errors.title && <div className="form-error">{errors.title}</div>}
                            </div>
                            <div className="form-row">
                                <div className="form-group">
                                    <label>Category</label>
                                    <select className="form-control" value={form.category} onChange={e => setForm({ ...form, category: e.target.value })}>
                                        <option value="">Select category</option>
                                        {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Author <span className="required">*</span></label>
                                    <input className={`form-control ${errors.author ? 'error' : ''}`} value={form.author} onChange={e => setForm({ ...form, author: e.target.value })} placeholder="Author name" />
                                    {errors.author && <div className="form-error">{errors.author}</div>}
                                </div>
                            </div>
                            <div className="form-group">
                                <label>Content <span className="required">*</span></label>
                                <div className="rich-toolbar">
                                    <button type="button"><i className="fas fa-bold"></i></button>
                                    <button type="button"><i className="fas fa-italic"></i></button>
                                    <button type="button"><i className="fas fa-list-ul"></i></button>
                                    <button type="button"><i className="fas fa-list-ol"></i></button>
                                    <button type="button"><i className="fas fa-link"></i></button>
                                    <button type="button"><i className="fas fa-image"></i></button>
                                </div>
                                <textarea className={`form-control rich-editor ${errors.content ? 'error' : ''}`}
                                    value={form.content} onChange={e => setForm({ ...form, content: e.target.value })}
                                    placeholder="Write your post content here..." />
                                {errors.content && <div className="form-error">{errors.content}</div>}
                            </div>
                            <div className="form-group">
                                <label>Featured Image URL</label>
                                <input className="form-control" value={form.featuredImage} onChange={e => setForm({ ...form, featuredImage: e.target.value })} placeholder="https://example.com/featured.jpg" />
                            </div>
                            <div className="form-group">
                                <label>Tags</label>
                                <div className="flex gap-2" style={{ flexWrap: 'wrap', marginBottom: 8 }}>
                                    {form.tags.map(t => (
                                        <span key={t} className="chip">
                                            {t}
                                            <span className="chip-remove" onClick={() => removeTag(t)}>&times;</span>
                                        </span>
                                    ))}
                                </div>
                                <div className="flex gap-2">
                                    <input className="form-control" placeholder="Add a tag..." value={tagInput}
                                        onChange={e => setTagInput(e.target.value)}
                                        onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); addTag(); } }} />
                                    <button type="button" className="btn btn-secondary btn-sm" onClick={addTag}>Add</button>
                                </div>
                            </div>
                            <div className="form-row">
                                <div className="form-group">
                                    <label>Publish Date</label>
                                    <input type="date" className="form-control" value={form.publishDate} onChange={e => setForm({ ...form, publishDate: e.target.value })} />
                                </div>
                                <div className="form-group">
                                    <label>Status</label>
                                    <select className="form-control" value={form.status} onChange={e => setForm({ ...form, status: e.target.value })}>
                                        <option value="draft">Draft</option>
                                        <option value="published">Published</option>
                                    </select>
                                </div>
                            </div>
                            <div className="form-actions">
                                <button type="button" className="btn btn-secondary" onClick={() => setShowForm(false)}>Cancel</button>
                                <button type="submit" className="btn btn-primary">{editItem ? 'Update Post' : 'Create Post'}</button>
                            </div>
                        </form>
                    </Modal>

                    <ConfirmModal isOpen={!!confirmDelete} onClose={() => setConfirmDelete(null)}
                        onConfirm={() => { onDelete(confirmDelete.id); toast('Post deleted', 'success'); }}
                        title="Delete Post" message={`Delete "${confirmDelete?.title}"?`} />
                </div>
            );
        }

        /* ============================================================
           ============================================================
           APPLICATIONS VIEW
           ============================================================ */
        function ApplicationsView({ applications, onUpdateStatus }) {
            const toast = useToast();
            const [search, setSearch] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [filterPosition, setFilterPosition] = useState('all');

            const positions = [...new Set(applications.map(a => a.position))];

            let filtered = applications.filter(a => {
                if (search && !a.name.toLowerCase().includes(search.toLowerCase()) && !a.email.toLowerCase().includes(search.toLowerCase())) return false;
                if (filterStatus !== 'all' && a.status !== filterStatus) return false;
                if (filterPosition !== 'all' && a.position !== filterPosition) return false;
                return true;
            });

            const handleStatusChange = (app, newStatus) => {
                onUpdateStatus(app.id, newStatus);
                toast(`Application ${newStatus}`, 'success');
            };

            const exportCSV = () => {
                const headers = ['Name', 'Email', 'Position', 'Submitted Date', 'Status'];
                const rows = filtered.map(a => [a.name, a.email, a.position, a.submittedDate, a.status]);
                const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `applications-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(url);
                toast('CSV exported!', 'success');
            };

            return (
                <div>
                    <div className="flex flex-center" style={{ justifyContent: 'space-between', marginBottom: 20 }}>
                        <h3 style={{ fontSize: 18, fontWeight: 700 }}>Applications</h3>
                        <button className="btn btn-secondary" onClick={exportCSV}>
                            <i className="fas fa-download"></i> Export CSV
                        </button>
                    </div>

                    <div className="filter-bar">
                        <div className="search-wrap">
                            <i className="fas fa-search"></i>
                            <input className="search-input" placeholder="Search by name or email..." value={search} onChange={e => setSearch(e.target.value)} />
                        </div>
                        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                            <option value="all">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="reviewed">Reviewed</option>
                            <option value="accepted">Accepted</option>
                            <option value="rejected">Rejected</option>
                        </select>
                        <select value={filterPosition} onChange={e => setFilterPosition(e.target.value)}>
                            <option value="all">All Positions</option>
                            {positions.map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                    </div>

                    <div className="card">
                        <div className="table-container">
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Position</th>
                                        <th>Submitted</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filtered.length === 0 && (
                                        <tr><td colSpan="6" style={{ textAlign: 'center', padding: 40, color: 'var(--gray-4)' }}>No applications found</td></tr>
                                    )}
                                    {filtered.map(a => (
                                        <tr key={a.id} style={a.status === 'pending' ? { background: 'var(--orange-light)' } : {}}>
                                            <td><strong>{a.name}</strong></td>
                                            <td>{a.email}</td>
                                            <td>{a.position}</td>
                                            <td>{new Date(a.submittedDate).toLocaleDateString()}</td>
                                            <td>
                                                <select className="form-control" style={{ width: 'auto', padding: '4px 28px 4px 8px', fontSize: 12 }}
                                                    value={a.status} onChange={e => handleStatusChange(a, e.target.value)}>
                                                    <option value="pending">Pending</option>
                                                    <option value="reviewed">Reviewed</option>
                                                    <option value="accepted">Accepted</option>
                                                    <option value="rejected">Rejected</option>
                                                </select>
                                            </td>
                                            <td>
                                                <div className="actions">
                                                    <button className="btn btn-success btn-sm" onClick={() => handleStatusChange(a, 'accepted')}>
                                                        <i className="fas fa-check"></i>
                                                    </button>
                                                    <button className="btn btn-danger btn-sm" onClick={() => handleStatusChange(a, 'rejected')}>
                                                        <i className="fas fa-times"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Summary Cards */}
                    <div className="stats-grid" style={{ marginTop: 24 }}>
                        <div className="stat-card">
                            <div className="stat-value" style={{ fontSize: 22 }}>{applications.filter(a => a.status === 'pending').length}</div>
                            <div className="stat-label">Pending Review</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value" style={{ fontSize: 22 }}>{applications.filter(a => a.status === 'reviewed').length}</div>
                            <div className="stat-label">Reviewed</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value" style={{ fontSize: 22, background: 'none', WebkitTextFillColor: 'unset', color: 'var(--success-text)' }}>{applications.filter(a => a.status === 'accepted').length}</div>
                            <div className="stat-label">Accepted</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-value" style={{ fontSize: 22, background: 'none', WebkitTextFillColor: 'unset', color: 'var(--orange-dark)' }}>{applications.filter(a => a.status === 'rejected').length}</div>
                            <div className="stat-label">Rejected</div>
                        </div>
                    </div>
                </div>
            );
        }

        /* ============================================================
           ============================================================
           APP — Root Component
           ============================================================ */
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(false);

            // Mock database — simulates a real backend
            const [events, setEvents] = useState(MOCK_DATA.events);
            const [gallery, setGallery] = useState(MOCK_DATA.gallery);
            const [members, setMembers] = useState(MOCK_DATA.members);
            const [posts, setPosts] = useState(MOCK_DATA.posts);
            const [applications, setApplications] = useState(MOCK_DATA.applications);
            const [categories, setCategories] = useState(MOCK_DATA.categories);
            const [tags, setTags] = useState(MOCK_DATA.tags);

            const tabTitles = {
                dashboard: 'Dashboard',
                events: 'Event Management',
                gallery: 'Gallery Management',
                members: 'Members & Interns',
                blog: 'Blog Management',
                applications: 'Applications Management',
            };

            const pendingCount = applications.filter(a => a.status === 'pending').length;

            const data = { events, gallery, members, posts, applications };

            const renderView = () => {
                switch (activeTab) {
                    case 'dashboard':
                        return <DashboardView data={data} />;
                    case 'events':
                        return <EventsView events={events}
                            onAdd={(e) => setEvents(prev => [e, ...prev])}
                            onUpdate={(e) => setEvents(prev => prev.map(i => i.id === e.id ? e : i))}
                            onDelete={(id) => setEvents(prev => prev.filter(i => i.id !== id))} />;
                    case 'gallery':
                        return <GalleryView gallery={gallery}
                            onAdd={(img) => setGallery(prev => [img, ...prev])}
                            onDelete={(id) => setGallery(prev => prev.filter(i => i.id !== id))}
                            onReorder={(items) => setGallery(items)} />;
                    case 'members':
                        return <MembersView members={members}
                            onAdd={(m) => setMembers(prev => [m, ...prev])}
                            onUpdate={(m) => setMembers(prev => prev.map(i => i.id === m.id ? m : i))}
                            onDelete={(id) => setMembers(prev => prev.filter(i => i.id !== id))} />;
                    case 'blog':
                        return <BlogView posts={posts} categories={categories} tags={tags}
                            onAdd={(p) => setPosts(prev => [p, ...prev])}
                            onUpdate={(p) => setPosts(prev => prev.map(i => i.id === p.id ? p : i))}
                            onDelete={(id) => setPosts(prev => prev.filter(i => i.id !== id))} />;
                    case 'applications':
                        return <ApplicationsView applications={applications}
                            onUpdateStatus={(id, status) => setApplications(prev => prev.map(a => a.id === id ? { ...a, status } : a))} />;
                    default:
                        return <DashboardView data={data} />;
                }
            };

            return (
                <div className="app-layout">
                    <Sidebar activeTab={activeTab} onNavigate={setActiveTab}
                        isOpen={sidebarOpen} onClose={() => setSidebarOpen(false)}
                        pendingCount={pendingCount} />
                    <div className="main-area">
                        <Header title={tabTitles[activeTab]} onToggleSidebar={() => setSidebarOpen(!sidebarOpen)} />
                        <main className="main-content">
                            {renderView()}
                        </main>
                    </div>
                </div>
            );
        }

        /* ============================================================
           Mount the App
           ============================================================ */
        const root = createRoot(document.getElementById('root'));
        root.render(
            <ToastProvider>
                <App />
            </ToastProvider>
        );
    </script>
</body>

</html>
